{% extends "base.html" %}
{% block title %}Goals{% endblock %}
{% block heading %}Goals{% endblock %}

{% block body %}
<div class="stats-row">
  <div class="stat-card">
    <div class="stat-label">Total Score</div>
    <div class="stat-value" id="total-score">--</div>
    <div class="stat-sub" id="total-grade"></div>
  </div>
</div>

<div id="goals-list">
  <div class="empty-state">Loading goals...</div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
  fetchJSON('/api/goals', function(data) {
    document.getElementById('header-date').textContent = data.date;
    document.getElementById('total-score').textContent = formatPercent(data.total_score);
    document.getElementById('total-grade').textContent = 'Grade: ' + data.grade;
    renderGoals(data.goals);
  });
});

function renderGoals(goals) {
  var container = document.getElementById('goals-list');
  if (!goals.length) {
    container.innerHTML = '<div class="card"><div class="empty-state">No goals configured.</div></div>';
    return;
  }

  var html = '';
  for (var i = 0; i < goals.length; i++) {
    var g = goals[i];
    var rawPct = Math.round(g.raw * 100);
    var weightPct = Math.round(g.weight * 100);

    html += '<div class="card goal-card">' +
      '<div class="goal-header">' +
      '<h3 class="goal-name">' + escapeHtml(g.name) + '</h3>' +
      '<span class="goal-weight">Weight: ' + weightPct + '%</span>' +
      '</div>' +
      '<p class="goal-desc">' + escapeHtml(g.description) + '</p>' +
      '<div class="goal-progress">' +
      '<div class="bar-track bar-track-lg"><div class="bar-fill goal-fill" style="width:' + rawPct + '%"></div></div>' +
      '<span class="goal-value">' + rawPct + '%</span>' +
      '</div>' +
      '<div class="goal-meta">' +
      '<span>Metric: ' + g.metric + '</span>' +
      '<span>Weighted contribution: ' + formatPercent(g.weighted) + '</span>' +
      '</div>' +
      '</div>';
  }
  container.innerHTML = html;
}
</script>
{% endblock %}
