{% extends "base.html" %}
{% block title %}Patterns{% endblock %}
{% block heading %}Patterns{% endblock %}

{% block body %}
<div class="stats-row">
  <div class="stat-card">
    <div class="stat-label">Patterns Found</div>
    <div class="stat-value" id="pattern-count">--</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Days Analyzed</div>
    <div class="stat-value" id="days-analyzed">--</div>
  </div>
</div>

<div id="patterns-list">
  <div class="empty-state">Loading patterns...</div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
  fetchJSON('/api/patterns', function(data) {
    document.getElementById('pattern-count').textContent = data.patterns.length;
    document.getElementById('days-analyzed').textContent = data.days_analyzed;
    renderPatterns(data.patterns);
  });
});

function renderPatterns(patterns) {
  var container = document.getElementById('patterns-list');
  if (!patterns.length) {
    container.innerHTML = '<div class="card"><div class="empty-state">No patterns discovered yet. Collect more data with <code>lwm collect</code>.</div></div>';
    return;
  }

  var html = '';
  for (var i = 0; i < patterns.length; i++) {
    var p = patterns[i];
    var confPct = Math.round(p.confidence * 100);
    var catClass = 'category-' + p.category;
    html += '<div class="card pattern-card">' +
      '<div class="pattern-header">' +
      '<span class="category-badge ' + catClass + '">' + p.category + '</span>' +
      '<span class="pattern-name">' + escapeHtml(p.name) + '</span>' +
      '</div>' +
      '<p class="pattern-desc">' + escapeHtml(p.description) + '</p>' +
      '<div class="pattern-meta">' +
      '<div class="confidence-bar-container">' +
      '<span class="meta-label">Confidence</span>' +
      '<div class="bar-track"><div class="bar-fill confidence-fill" style="width:' + confPct + '%"></div></div>' +
      '<span class="meta-value">' + confPct + '%</span>' +
      '</div>' +
      '<span class="meta-item">' + p.days_observed + ' days observed</span>' +
      (p.first_seen ? '<span class="meta-item">Since ' + p.first_seen + '</span>' : '') +
      '</div>' +
      '</div>';
  }
  container.innerHTML = html;
}
</script>
{% endblock %}
